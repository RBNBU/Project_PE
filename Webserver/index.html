<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APRS Home</title>
    <link rel="icon" type="image/png" href="img/title.png">
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <header>
        <div class="brand-header">
            <h1>CarRadio Monitor</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Dashboard</a></li>
                <li><a href="history.html">Historical</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard-wrapper">
        <aside id="stats-panel" class="stats-panel collapsed">
            <div class="stats-container">
                <div class="stats-grid">
                    <div class="card">
                        <h3 class="card-title">Station Info</h3>
                        <div class="stat-list">
                            <div class="stat-item"><span>Callsign:</span> <strong id="callsign">---</strong></div>
                            <div class="stat-item"><span>Last Update (UTC):</span> <strong id="time">---</strong></div>
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="card-title">Location</h3>
                        <div class="stat-group">
                            <div class="stat"><span>Lat</span> <strong id="lat">-</strong></div>
                            <div class="stat"><span>Lon</span> <strong id="lon">-</strong></div>
                            <div class="stat"><span>Altitude</span> <strong id="alt">-</strong></div>
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="card-title">Motion</h3>
                        <div class="main-stat"><span id="speed">-</span><small>km/h</small></div>
                        <p class="stat"><span>Course</span> <strong><span id="course-text">-</span> (<span id="course-deg">-</span>°)</strong></p>
                    </div>

                    <div id="alarm-card" class="card">
                        <h3 class="card-title">Alarm Status</h3>
                        <div class="alarm-display">
                            <span id="alarm-text">OK</span>
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="card-title">Temperature</h3>
                        <div class="main-stat"><span id="temp">-</span><small>°C</small></div>
                    </div>

                    <div class="card">
                        <h3 class="card-title">Atmosphere</h3>
                        <div class="stat-list">
                            <div class="stat-item"><span>Cloud:</span> <strong id="clouds">-</strong></div>
                            <div class="stat-item"><span>Wind:</span> <strong id="wind">-</strong></div>
                            <div class="stat-item"><span>Humidity:</span> <strong id="hum">-</strong></div>
                            <div class="stat-item"><span>Rain:</span> <strong id="rain">-</strong></div>
                        </div>
                    </div>
                </div>
            </div>

            <button id="toggle-stats" class="toggle-btn">
                <span>☰</span>
            </button>
        </aside>

        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/index.js"></script>
</body>
</html>
